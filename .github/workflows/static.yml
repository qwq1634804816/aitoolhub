# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- 第一步：设置 Node.js 环境 ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 推荐指定版本，或者用 lts/*
          cache: 'pnpm'       # 告诉它缓存 pnpm 依赖

      # --- 第二步：关键！安装 pnpm ---
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # --- 第三步：安装项目依赖 ---
      - name: Install dependencies
        run: pnpm install

      # --- 第四步：构建项目 ---
      - name: Build
        run: pnpm run build  # 或者你的构建命令，如 pnpm build

      # --- 第五步：上传产物 ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # 确保这里是你的输出目录，如果是根目录用 '.'

      # --- 第六步：部署 ---
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
