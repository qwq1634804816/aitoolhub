# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # 触发条件：推送到 main 分支，或者手动运行
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- 新增步骤 1: 设置 Node.js 环境 ---
      # 如果你的项目是纯静态 HTML/CSS/JS，不需要这一步
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 推荐使用 LTS 版本
          cache: 'npm'       # 开启缓存加速安装

      # --- 新增步骤 2: 安装依赖 ---
      - name: Install dependencies
        run: npm ci

      # --- 新增步骤 3: 构建项目 ---
      # 注意：如果你的构建命令不是 npm run build，请改成你的命令
      - name: Build
        run: npm run build

      # --- 关键修改点 ---
      # 这里要指定上传构建后的文件夹，而不是整个仓库
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 👈 这里改成你构建输出的文件夹，通常是 dist 或 build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
