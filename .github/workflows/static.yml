name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1️⃣ 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 2️⃣ 安装 pnpm（关键修复点）
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      # 👉 确保 pnpm 在 PATH（保险做法）
      - name: Verify pnpm
        run: pnpm -v

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4️⃣ 构建
      - name: Build
        run: pnpm build

      # 5️⃣ 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # 6️⃣ 部署
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
