theme = 'brookmint'

[general]
title = "🚀 AI 工具导航"
# Logo 图片路径（可选）：如果提供图片路径，将显示图片 logo
logo = ""
# Logo 图标（可选）：如果没有设置 logo 图片，将显示图标。留空字符串 "" 则不显示任何图标，只显示文字标题
# 图标来自 https://icon-sets.iconify.design/ （例如：tabler:robot）
iconLogo = ""

[general.seo]
name = "AI工具导航"
description = "收录最全AI工具，涵盖写作、绘图、编程、视频、办公等多个领域，每日更新。"
url = "https://aitoolhub.com/zh"

[directoryData.source]
name = "default"
links = "normal"

[directoryData.tagPages]
title = "{0} AI工具"

[directoryData.search]
placeholder = "在 {0} 个AI工具中搜索..."

[directoryData.search.tags]
display = "show-all"
intersection = false
placeholder = "选择分类"

